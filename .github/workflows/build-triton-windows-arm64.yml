name: Build Triton (Windows ARM64)

on:
  workflow_dispatch:
    inputs:
      git_tag:
        description: Git tag
        required: true
        type: string
        default: main-windows
      triton_wheel_version_suffix:
        description: Triton wheel version suffix
        required: false
        type: string
        default: ''
      triton_build_binary:
        description: Build binary executables
        required: true
        type: string
        default: '0'
      triton_build_proton:
        description: Build Proton
        required: true
        type: string
        default: '0'
      triton_build_ut:
        description: Build C++ unit tests
        required: true
        type: string
        default: '0'
      triton_rel_build_with_asserts:
        description: Build with PDB and asserts
        required: true
        type: string
        default: '0'
      cibw_build_override:
        description: CIBW_BUILD override
        required: false
        type: string
        default: ''

jobs:
  resolve-ref:
    runs-on: windows-2022
    permissions:
      contents: read
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_tag }}
          path: triton-windows

      - id: resolve
        shell: powershell
        run: |
          cd triton-windows
          "commit_sha=$(git rev-parse HEAD)" >> $Env:GITHUB_OUTPUT

  build-triton:
    name: Build Windows ARM64 ${{ inputs.git_tag }} @ ${{ needs.resolve-ref.outputs.commit_sha }}
    needs: resolve-ref
    runs-on: windows-11-arm
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Configure Git
        shell: powershell
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-ref.outputs.commit_sha }}
          path: triton-windows

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: 'arm64'

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Build wheels
        shell: powershell
        env:
          CUDA_WINDOWS_ARM64_SHA256: a1f68c81160b16d519c4087788b9c07de41306c3f1b872471ceee0996621374d
          CUDA_WINDOWS_ARM64_URL: https://packages.nvidia.com/prerelease/cuda/13.4.0/local_installers/cuda_13.4.0_windows_arm64.exe
          LLVM_WINDOWS_ARM64_URL: https://github.com/chinazhangchao/triton-windows/releases/download/triton_win_arm64-3.8.0/llvm-62b7cf96-windows-arm64-2.tar.gz
          TRITON_WHEEL_VERSION_SUFFIX: ${{ inputs.triton_wheel_version_suffix }}
          TRITON_BUILD_BINARY: ${{ inputs.triton_build_binary }}
          TRITON_BUILD_PROTON: ${{ inputs.triton_build_proton }}
          TRITON_BUILD_UT: ${{ inputs.triton_build_ut }}
          TRITON_REL_BUILD_WITH_ASSERTS: ${{ inputs.triton_rel_build_with_asserts }}
          CIBW_BUILD_OVERRIDE: ${{ inputs.cibw_build_override }}
        run: |
          # Get-ChildItem Env:
          # (Get-WmiObject Win32_Processor).Name
          # (Get-WmiObject Win32_PhysicalMemory | Measure-Object -Property Capacity -Sum).Sum / 1GB
          # (Get-WmiObject Win32_VideoController).Name

          # Get-Command -All python
          # python --version
          python -m pip install --upgrade pip
          pip install --upgrade cibuildwheel

          $cudaInstaller = Join-Path $Env:RUNNER_TEMP "cuda_13.4.0_windows_arm64.exe"
          curl.exe --fail --location --retry 5 --retry-delay 5 --continue-at - `
            --output $cudaInstaller $Env:CUDA_WINDOWS_ARM64_URL
          if ($LASTEXITCODE -ne 0)
          {
            throw "Failed to download CUDA installer"
          }
          $cudaInstallerSha256 = (Get-FileHash -Algorithm SHA256 $cudaInstaller).Hash.ToLowerInvariant()
          if ($cudaInstallerSha256 -ne $Env:CUDA_WINDOWS_ARM64_SHA256)
          {
            throw "CUDA installer SHA256 mismatch: $cudaInstallerSha256"
          }

          $cudaInstall = Start-Process -FilePath $cudaInstaller -ArgumentList "-s" -Wait -PassThru
          if ($cudaInstall.ExitCode -notin @(0, 3010))
          {
            throw "CUDA installer exited with code $($cudaInstall.ExitCode)"
          }
          Remove-Item $cudaInstaller

          $cudaRoot = Join-Path $Env:ProgramFiles "NVIDIA GPU Computing Toolkit\CUDA\v13.4"
          $ptxasPath = Join-Path $cudaRoot "bin\ptxas.exe"
          $cudaHeaderPath = Join-Path $cudaRoot "include\cuda.h"
          $cudaLibraryPath = Join-Path $cudaRoot "lib\arm64\cuda.lib"
          foreach ($cudaPath in @($ptxasPath, $cudaHeaderPath, $cudaLibraryPath))
          {
            if (-not (Test-Path $cudaPath))
            {
              throw "CUDA install file was not found at $cudaPath"
            }
          }

          $nvidiaBackend = Join-Path $PWD "triton-windows\third_party\nvidia\backend"
          New-Item -ItemType Directory -Force -Path `
            (Join-Path $nvidiaBackend "bin"), `
            (Join-Path $nvidiaBackend "include"), `
            (Join-Path $nvidiaBackend "lib\arm64") | Out-Null
          Copy-Item $ptxasPath (Join-Path $nvidiaBackend "bin\ptxas.exe") -Force
          Copy-Item $cudaHeaderPath (Join-Path $nvidiaBackend "include\cuda.h") -Force
          Copy-Item $cudaLibraryPath (Join-Path $nvidiaBackend "lib\arm64\cuda.lib") -Force

          $Env:CUDA_PATH = $cudaRoot
          $Env:TRITON_PTXAS_PATH = $ptxasPath
          $Env:TRITON_CUDART_PATH = Join-Path $cudaRoot "include"

          $llvmInstallDir = "llvm-62b7cf96-windows-arm64-2"
          $llvmRoot = Join-Path $Env:RUNNER_TEMP "llvm"
          $llvmArchive = Join-Path $Env:RUNNER_TEMP "$llvmInstallDir.tar.gz"
          New-Item -ItemType Directory -Force -Path $llvmRoot | Out-Null
          Invoke-WebRequest -Uri $Env:LLVM_WINDOWS_ARM64_URL -OutFile $llvmArchive
          tar -xzf $llvmArchive -C $llvmRoot
          $Env:LLVM_SYSPATH = Join-Path $llvmRoot $llvmInstallDir
          $Env:TRITON_LLVM_SYSTEM_SUFFIX = "windows-arm64"
          if (-not (Test-Path (Join-Path $Env:LLVM_SYSPATH "lib/cmake/llvm")))
          {
            throw "LLVM install was not found at $Env:LLVM_SYSPATH"
          }

          cd triton-windows
          git fetch origin "+refs/heads/*:refs/remotes/origin/*"
          git rev-parse HEAD
          git for-each-ref --contains HEAD --format "%(refname:short)"

          if ($Env:CIBW_BUILD_OVERRIDE)
          {
            $Env:CIBW_BUILD = $Env:CIBW_BUILD_OVERRIDE
          }
          else
          {
            $Env:CIBW_BUILD = "cp311-win_arm64 cp312-win_arm64 cp313-win_arm64 cp314-win_arm64"
          }

          $Env:CIBW_ARCHS_WINDOWS = "ARM64"
          $Env:CIBW_BUILD_VERBOSITY = "1"

          if (Test-Path -Path setup.py)
          {
            cibuildwheel .
          }
          else
          {
            cibuildwheel python
          }

      - uses: actions/attest@v4
        with:
          subject-path: triton-windows/wheelhouse/*.whl

      # Currently actions/upload-artifact only supports uploading one file at a time when archive is disabled
      - uses: actions/upload-artifact@v7
        with:
          path: triton-windows/wheelhouse/*-cp311-cp311-win_arm64.whl
          archive: false

      - uses: actions/upload-artifact@v7
        with:
          path: triton-windows/wheelhouse/*-cp312-cp312-win_arm64.whl
          archive: false

      - uses: actions/upload-artifact@v7
        with:
          path: triton-windows/wheelhouse/*-cp313-cp313-win_arm64.whl
          archive: false

      - uses: actions/upload-artifact@v7
        with:
          path: triton-windows/wheelhouse/*-cp314-cp314-win_arm64.whl
          archive: false
